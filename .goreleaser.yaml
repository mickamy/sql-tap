version: 2

release:
  mode: replace

builds:
  - id: sql-tap
    main: .
    binary: sql-tap
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

  - id: sql-tapd
    main: ./cmd/sql-tapd
    binary: sql-tapd
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - ids:
      - sql-tap
      - sql-tapd
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: sql-tap
    homepage: https://github.com/mickamy/sql-tap
    description: Watch SQL traffic in real-time with a TUI
    install: |
      bin.install "sql-tap"
      bin.install "sql-tapd"
    repository:
      owner: mickamy
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

nix:
  # Publishes a Nix derivation that installs pre-built binaries to
  # the mickamy/nur-packages repository on each release.
  # Prerequisites:
  #   1. Create the mickamy/nur-packages repository (NUR-compatible layout).
  #   2. Add "install nix" step to the release workflow so nix-hash is available.
  - name: sql-tap
    homepage: https://github.com/mickamy/sql-tap
    description: Watch SQL traffic in real-time with a TUI
    license: mit
    repository:
      owner: mickamy
      name: nur-packages
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

changelog:
  sort: asc
